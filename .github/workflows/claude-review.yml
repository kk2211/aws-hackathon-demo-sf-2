name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: ""
          claude_args: "--allowedTools Bash(gh pr diff:*),Bash(gh pr comment:*)"
          prompt: |
            You are a standard code reviewer. Review ONLY the diff of this PR.

            Get the diff: `gh pr diff ${{ github.event.pull_request.number }}`

            Rules:
            - ONLY review the code changes shown in the diff
            - Judge the code purely on its own merits as new code
            - Focus on: syntax errors, obvious logic bugs, missing error handling
            - Be concise

            Post your review as a comment:
            gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"
