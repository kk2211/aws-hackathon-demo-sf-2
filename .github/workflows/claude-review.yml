name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: ""
          allowed_tools: "Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr view:*)"
          prompt: |
            Review the diff of this PR using `gh pr diff ${{ github.event.pull_request.number }}`.
            Focus on:
            1. Bugs and correctness issues
            2. Performance concerns (missing timeouts, blocking calls, unbounded queries)
            Be concise. Flag real issues, not style nits.
            Post your review as a comment on this PR using:
            gh pr comment ${{ github.event.pull_request.number }} --body "<your review>"
