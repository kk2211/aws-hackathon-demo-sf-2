services:
  app:
    build: .
    ports:
      - "9000:5000"
    environment:
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=acme-order-service
      - DD_ENV=demo
      - DD_VERSION=1.0.0
      - REDIS_HOST=redis
      - FRAUD_API_URL=http://app:5000/_mock/fraud
      - EMAIL_API_URL=http://app:5000/_mock/email
    depends_on:
      - redis
      - datadog-agent

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_APM_ENABLED=true
      - DD_LOGS_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    ports:
      - "8126:8126"
      - "8125:8125/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
